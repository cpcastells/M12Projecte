version: "3.9"

services:
  postgres:
    image: postgres:15
    container_name: abyssal_postgres
    restart: unless-stopped
    ports:
      - "5432:5432"
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: admin
      POSTGRES_DB: abyssal_db
    volumes:
      - postgres_data:/var/lib/postgresql/data

volumes:
  postgres_data:
