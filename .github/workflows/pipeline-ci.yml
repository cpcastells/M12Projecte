name: CI

# S'executa en PRs cap a main i en pushes directes a main
on:
  pull_request:
    branches: [main]
  push:
    branches: [main]

jobs:
  test-frontend:
    name: Frontend Tests
    # Màquina virtual on s'executen els tests
    runs-on: ubuntu-latest
    # Totes les comandes s'executen dins del directori frontend/
    defaults:
      run:
        working-directory: frontend
    steps:
      # Clona el repositori
      - uses: actions/checkout@v4

      # Instal·la Node.js i cacheja les dependències per anar més ràpid
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      # Instal·la les dependències
      - run: npm ci
      # Executa els tests — si fallen, la pipeline falla i bloqueja el merge
      - run: npm test
